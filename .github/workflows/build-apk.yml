name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to manually trigger the workflow from the GitHub UI

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 
          cache: npm
          cache-dependency-path: 'mobile/package-lock.json' # Change to yarn.lock if you use yarn

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }} # Connects via the secret you added in Step 2

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: 🚀 Build APK
        working-directory: ./mobile
        run: eas build --platform android --profile preview --local --non-interactive

      - name: 📥 Download APK from Expo
        working-directory: ./mobile
        run: |
          # The JSON output contains the URL. We use jq to extract it and wget to download it.
          apk_url=$(jq -r '.[0].artifacts.buildUrl' eas-build.json)
          echo "Downloading from: $apk_url"
          wget $apk_url -O QuickBites.apk

      - name: 📦 Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0-${{ github.run_number }}"
          name: "QuickBites APK - Build ${{ github.run_number }}"
          files: mobile/QuickBites.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}