name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch: 
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile
        run: npm install --legacy-peer-deps

      - name: Build on EAS (Cloud)
        working-directory: ./mobile
        run: eas build --platform android --profile preview --non-interactive --json > eas-build.json

      - name: Download APK
        working-directory: ./mobile
        run: |
          apk_url=$(jq -r '.[0].artifacts.buildUrl' eas-build.json)
          curl -L $apk_url -o QuickBites.apk

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "QuickBites APK - Build ${{ github.run_number }}"
          files: mobile/QuickBites.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}