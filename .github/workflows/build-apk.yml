name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 
          cache: npm
          cache-dependency-path: 'mobile/package-lock.json' 

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm 
          token: ${{ secrets.EXPO_TOKEN }} 

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm install

      - name: 🔐 Create .env file
        working-directory: ./mobile
        run: echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" > .env

      - name: 🚀 Build APK Locally
        working-directory: ./mobile
        run: eas build --platform android --profile preview --local --non-interactive

      - name: 📝 Rename APK
        working-directory: ./mobile
        run: mv *.apk QuickBites.apk

      - name: 📦 Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0-${{ github.run_number }}"
          name: "QuickBites APK - Build ${{ github.run_number }}"
          files: mobile/QuickBites.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}